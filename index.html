<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="CCM & Epic">
  <meta name="theme-color" content="#0a0a0f">
  <title>CCM & Epic Golf</title>
  <link rel="manifest" href="manifest.json"
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- SPLASH -->
  <div id="splash">
    <div class="splash-inner">
      <div class="splash-flag">⛳</div>
      <h1 class="splash-title">CCM <span>&</span> Epic</h1>
      <p class="splash-sub">Golf Tournament</p>
      <div class="splash-loader"><div></div></div>
    </div>
  </div>

  <!-- APP SHELL -->
  <div id="app" class="hidden">

    <!-- HEADER -->
    <header class="app-header">
      <div class="header-left">
        <span class="header-logo">⛳</span>
        <span class="header-title">CCM <em>&</em> Epic</span>
      </div>
      <div class="header-right">
        <span id="live-badge" class="live-badge hidden">EN VIVO</span>
        <button class="icon-btn" id="btn-refresh" title="Actualizar">↻</button>
      </div>
    </header>

    <!-- NAV -->
    <nav class="bottom-nav">
      <button class="nav-item active" data-view="leaderboard">
        <span class="nav-icon">🏆</span>
        <span>Ranking</span>
      </button>
      <button class="nav-item" data-view="cuartos">
        <span class="nav-icon">👥</span>
        <span>Cuartos</span>
      </button>
      <button class="nav-item nav-cta" data-view="cargar">
        <span class="nav-icon">✚</span>
        <span>Cargar</span>
      </button>
      <button class="nav-item" data-view="historial">
        <span class="nav-icon">📅</span>
        <span>Historial</span>
      </button>
    </nav>

    <!-- VIEWS -->
    <main class="view-container">

      <!-- LEADERBOARD -->
      <section id="view-leaderboard" class="view active">
        <div class="view-header">
          <h2>Leaderboard</h2>
          <span id="last-update" class="update-time"></span>
        </div>

        <div class="tabs">
          <button class="tab active" data-tab="individual">Individual</button>
          <button class="tab" data-tab="parejas">Parejas</button>
          <button class="tab" data-tab="cuartos-rank">Cuartos</button>
        </div>

        <div id="tab-individual" class="tab-content active">
          <div id="podio" class="podio"></div>
          <div id="tabla-individual" class="score-table"></div>
        </div>
        <div id="tab-parejas" class="tab-content">
          <div id="tabla-parejas" class="score-table"></div>
        </div>
        <div id="tab-cuartos-rank" class="tab-content">
          <div id="tabla-cuartos" class="score-table"></div>
        </div>
      </section>

      <!-- CUARTOS DETAIL -->
      <section id="view-cuartos" class="view">
        <div class="view-header">
          <h2>Cuartos</h2>
        </div>
        <div id="cuartos-selector" class="cuartos-grid"></div>
        <div id="cuarto-detail" class="cuarto-detail hidden"></div>
      </section>

      <!-- CARGAR SCORES -->
      <section id="view-cargar" class="view">
        <div class="view-header">
          <h2>Cargar Scores</h2>
        </div>
        <form id="score-form" class="score-form" onsubmit="return false;">

          <div class="form-step active" id="step-1">
            <p class="step-label">Paso 1 — ¿Qué cuarto anotás?</p>
            <div id="cuarto-btns" class="option-grid"></div>
          </div>

          <div class="form-step" id="step-2">
            <p class="step-label">Paso 2 — ¿Qué hoyos terminaron?</p>
            <div id="bloque-btns" class="option-grid">
              <button type="button" class="option-btn" data-bloque="1-3">Hoyos 1–3</button>
              <button type="button" class="option-btn" data-bloque="4-6">Hoyos 4–6</button>
              <button type="button" class="option-btn" data-bloque="7-9">Hoyos 7–9</button>
              <button type="button" class="option-btn" data-bloque="10-12">Hoyos 10–12</button>
              <button type="button" class="option-btn" data-bloque="13-15">Hoyos 13–15</button>
              <button type="button" class="option-btn" data-bloque="16-18">Hoyos 16–18</button>
            </div>
          </div>

          <div class="form-step" id="step-3">
            <p class="step-label">Paso 3 — Golpes por hoyo</p>
            <div id="inputs-golpes" class="golpes-grid"></div>
          </div>

          <div class="form-step" id="step-4">
            <p class="step-label">Confirmá antes de enviar</p>
            <div id="confirm-preview" class="confirm-preview"></div>
            <div class="form-actions">
              <button type="button" id="btn-edit" class="btn-secondary">Editar</button>
              <button type="button" id="btn-enviar" class="btn-primary">Enviar ✓</button>
            </div>
          </div>

          <div id="form-success" class="form-success hidden">
            <div class="success-icon">✓</div>
            <p>¡Scores cargados!</p>
            <button type="button" id="btn-nuevo" class="btn-secondary">Cargar otro bloque</button>
          </div>

        </form>
      </section>

      <!-- HISTORIAL -->
      <section id="view-historial" class="view">
        <div class="view-header">
          <h2>Historial</h2>
        </div>
        <div id="historial-list" class="historial-list"></div>
      </section>

    </main>
  </div>

  <script src="js/config.js"></script>
  <script src="js/sheets.js"></script>
  <script src="js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
</html>
